[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "brazilcep"
version = "6.3.1"
description = "Minimalist and easy-to-use python library designed to query CEP (brazilian zip codes) data"
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Michell Stuttgart", email = "michellstut@gmail.com" }]
requires-python = ">=3.8"
classifiers = [
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Development Status :: 5 - Production/Stable",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Libraries",
  "Natural Language :: English",
  "Natural Language :: Portuguese (Brazilian)",
]

dependencies = ["zeep>=4.2.1", "requests>=2.28.2", "beautifulsoup4==4.12.3"]

[project.optional-dependencies]

dev = [
  "nox>=2022.11.21",
  "pytest>=7.3.1",
  "requests-mock>=1.10.0",
  "black>=23.0,<24.0",
  "isort>=5.12,<5.13",
  "ruff",
  "twine>=1.11.0",
  "build",
  "setuptools",
  "wheel",
  "packaging",
]

coverage = ["coveralls>=3.3.1", "pytest-cov>=4.0.0", "requests-mock>=1.10.0"]
docs = [
    "Sphinx>=4.3.0,<7.1.0",
    "alabaster",
    "readme-renderer==43",
    "myst-parser>=1.0,<2.1",
    "sphinx-copybutton==0.5.2",
    "sphinx-autobuild==2021.3.14",
    "sphinx-autodoc-typehints==1.23.3",
]

[project.urls]
Homepage = "https://github.com/mstuttgart/brazilcep"
Documentation = "https://github.com/mstuttgart/brazilcep/tree/main#readme"
Tracker = "https://github.com/mstuttgart/brazilcep/issues"
Repository = "https://github.com/mstuttgart/brazilcep"
Changelog = "https://github.com/mstuttgart/brazilcep/blob/main/CHANGELOG.md"

[tool.check-manifest]
ignore = [
  ".*",
  "test/**",
  "docs/**",
  "bin/**",
  "*.yml",
  "noxfile.py",
  ".pylintrc",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-data]
my_package = ["py.typed"]

[tool.setuptools.dynamic]
version = { attr = "brazilcep.version.VERSION" }

[tool.black]
line-length = 100
include = '\.pyi?$'
exclude = '''
(
      __pycache__
    | \.git
    | \.mypy_cache
    | \.pytest_cache
    | \.vscode
    | \.venv
    | \bdist\b
    | \bdoc\b
    | \.nox
    | \.github
)
'''

[tool.isort]
profile = "black"
multi_line_output = 3

# You can override these pyright settings by adding a personal pyrightconfig.json file.
[tool.pyright]
reportPrivateImportUsage = false

[tool.ruff]
line-length = 115
target-version = "py39"

[tool.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.pytest.ini_options]
testpaths = "tests/"
python_classes = [
  "Test*",
  "*Test"
]
